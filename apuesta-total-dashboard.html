<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APUESTA TOTAL - Dashboard Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #121212;
        }

        ::-webkit-scrollbar-thumb {
            background: #5a5a5a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b3b3b3;
        }

        /* ==================== HEADER ==================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #000000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-box {
            width: 140px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .titulo {
            font-size: 42px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 1px;
            margin: 0;
        }

        .apuesta {
            color: #e6e6e6;
        }

        .total {
            color: #ff3b30;
            text-shadow: 0 0 8px rgba(255, 59, 48, 0.4);
        }

        .subtitulo {
            color: #9e9e9e;
            font-size: 16px;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        .header-right {
            display: flex;
            gap: 16px;
        }

        .header-btn {
            padding: 12px 24px;
            border-radius: 500px;
            background: #111111;
            cursor: pointer;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .header-btn.yellow {
            border: 1px solid #ffd700;
            color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2), inset 0 0 5px rgba(255, 215, 0, 0.1);
        }

        .header-btn.yellow:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 10px rgba(255, 215, 0, 0.3);
            background: #1a1a1a;
        }

        .header-btn.green {
            border: 1px solid #00ff88;
            color: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2), inset 0 0 5px rgba(0, 255, 136, 0.1);
        }

        .header-btn.green:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6), inset 0 0 10px rgba(0, 255, 136, 0.3);
            background: #1a1a1a;
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* ==================== NAVEGACIÓN MESES ==================== */
        .month-navigation {
            text-align: left;
            margin-bottom: 30px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 16px;
        }

        .month-nav-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .month-nav-btn:hover {
            color: #ff3b30;
            text-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
        }

        .month-display {
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .month-display .month-name {
            color: #e6e6e6;
        }

        .month-display .month-year {
            color: #ff3b30;
        }

        /* ==================== PROMOCIONES ==================== */
        .promotions-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .promotions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .promotion-card {
            background: #111111;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid transparent;
            position: relative;
        }

        .promotion-card:hover:not(.unavailable) {
            transform: translateY(-4px);
            filter: brightness(1.2);
        }

        .promotion-card.green {
            border-color: #00ff66;
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.2);
        }
        .promotion-card.green:hover { box-shadow: 0 0 20px rgba(0, 255, 102, 0.5); }

        .promotion-card.yellow {
            border-color: #ffd700;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.2);
        }
        .promotion-card.yellow:hover { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }

        .promotion-card.purple {
            border-color: #9d4edd;
            box-shadow: 0 0 12px rgba(157, 78, 221, 0.2);
        }
        .promotion-card.purple:hover { box-shadow: 0 0 20px rgba(157, 78, 221, 0.5); }

        .promotion-card.blue {
            border-color: #00d9ff;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.2);
        }
        .promotion-card.blue:hover { box-shadow: 0 0 20px rgba(0, 217, 255, 0.5); }

        .promotion-card.red {
            border-color: #ff0066;
            box-shadow: 0 0 12px rgba(255, 0, 102, 0.2);
        }
        .promotion-card.red:hover { box-shadow: 0 0 20px rgba(255, 0, 102, 0.5); }

        .promotion-card.unavailable {
            border-color: #333333;
            box-shadow: none;
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }

        .promotion-card.unavailable .promotion-name {
            color: #888888;
        }

        .promotion-icon {
            font-size: 28px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            flex-shrink: 0;
        }

        .promotion-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }

        .promotion-name {
            font-size: 13px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.2;
            text-transform: uppercase;
        }

        .promotion-explore {
            font-size: 11px;
            font-weight: 700;
            color: #888888;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .promotion-card:hover:not(.unavailable) .promotion-explore {
            color: #ffffff;
        }

        /* ==================== CALENDARIO ==================== */
        .calendar-wrapper {
            background: #181818;
            border-radius: 8px;
            padding: 32px;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .calendar-day-name {
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            color: #b3b3b3;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-cell {
            aspect-ratio: 1;
            background: transparent;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: background-color 0.2s ease;
            position: relative;
            min-height: 80px;
            padding-top: 8px;
        }

        .calendar-cell:hover {
            background: #2a2a2a;
        }

        .calendar-cell.today {
            background: rgba(255, 255, 255, 0.05);
        }

        .calendar-cell.empty {
            cursor: default;
            background: transparent;
        }

        .calendar-cell.empty:hover {
            background: transparent;
        }

        .cell-number {
            font-size: 14px;
            font-weight: 700;
            color: #b3b3b3;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .calendar-cell.today .cell-number {
            color: #000000;
            background: #1ED760;
        }

        .cell-icons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px;
            font-size: 20px;
            margin-top: 4px;
        }

        /* ==================== MODAL ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #282828;
            border-radius: 8px;
            padding: 32px;
            max-width: 480px;
            width: 90%;
            animation: slideUp 0.3s ease;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b3b3b3;
            font-size: 20px;
            transition: color 0.2s ease, background-color 0.2s ease;
        }

        .modal-close:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .modal-info {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
            color: #b3b3b3;
            font-size: 14px;
        }

        .modal-info-item {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .modal-info-label {
            color: #ffffff;
            font-weight: 600;
            min-width: 90px;
        }

        .modal-btn {
            width: 100%;
            padding: 16px;
            background: #1ED760;
            border: none;
            border-radius: 500px;
            color: #000000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .modal-btn:hover {
            transform: scale(1.04);
            background: #1fdf64;
        }

        /* ==================== RESPONSIVO ==================== */
        @media (max-width: 768px) {
            .header {
                padding: 16px 20px;
                flex-direction: column;
                gap: 16px;
            }

            .header-right {
                width: 100%;
                justify-content: center;
            }

            .container {
                padding: 24px 20px;
            }

            .month-display {
                font-size: 24px;
            }

            .calendar-wrapper {
                padding: 20px;
            }

            .calendar-cell {
                min-height: 60px;
            }

            .header-btn {
                padding: 10px 24px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .header-left {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }

        .titulo {
                font-size: 20px;
            }

        .subtitulo {
                font-size: 12px;
            }

            .month-navigation {
                justify-content: center;
            }

            .promotions-grid {
                grid-template-columns: 1fr;
            }

            .calendar-cell {
                min-height: 50px;
            }

            .cell-icons {
                font-size: 14px;
            }

            .modal-content {
                padding: 24px;
            }

            .modal-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div class="header-left">
            <div class="logo-box">
                <img src="img/Logo1.jpg" alt="Logo Oficial Apuesta Total">
            </div>
            <div class="header-text">
                <h1 class="titulo"><span class="apuesta">APUESTA</span> <span class="total">TOTAL</span></h1>
                <p class="subtitulo">CALENDARIO INTERACTIVO DE PROMOCIONES</p>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn yellow" onclick="window.open('mundial-2026.html', '_blank')">
                🏆 FIXTURE MUNDIAL
            </button>
            <button class="header-btn green" onclick="handleFilterChange('grilla')">
                ⚡ DATO AT - GRILLA
            </button>
        </div>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <div class="container">
        <!-- ==================== MONTH NAVIGATION ==================== -->
        <div class="month-navigation">
            <button class="month-nav-btn" onclick="previousMonth()">&lt;</button>
            <div class="month-display">
                <span class="month-name" id="monthName">JUNIO</span>
                <span class="month-year" id="yearName">2026</span>
            </div>
            <button class="month-nav-btn" onclick="nextMonth()">&gt;</button>
        </div>

        <!-- ==================== PROMOTIONS ==================== -->
        <div class="promotions-section">
            <h2 class="section-title">🎁 Promociones Destacadas</h2>
            <div class="promotions-grid" id="promotionsGrid">
                <!-- Se genera dinámicamente -->
            </div>
        </div>

        <!-- ==================== CALENDAR ==================== -->
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <div class="calendar-day-name">Lun</div>
                <div class="calendar-day-name">Mar</div>
                <div class="calendar-day-name">Mié</div>
                <div class="calendar-day-name">Jue</div>
                <div class="calendar-day-name">Vie</div>
                <div class="calendar-day-name">Sab</div>
                <div class="calendar-day-name">Dom</div>
            </div>
            <div class="calendar-days" id="calendarDays">
                <!-- Se genera dinámicamente -->
            </div>
        </div>
    </div>

    <!-- ==================== MODAL ==================== -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 class="modal-title" id="modalTitle">Promoción</h2>
            <div class="modal-info" id="modalInfo">
                <!-- Se genera dinámicamente -->
            </div>
            <button class="modal-btn" onclick="closeModal()">Ver Detalle Completo</button>
        </div>
    </div>

    <script>
        // ==================== DATOS ==================== 
        const promotions = {
            '2026-05-25': {
                name: 'PROMO 5X5 – VIRTUALES (MAYO)',
                category: 'purple',
                icon: '🎮',
                description: 'Jugadas gratis de S/ 5 para cualquier juego virtual.',
                htmlDetails: `
                    <div style="margin-bottom: 12px; line-height: 1.5; color: #ffffff;"><strong>🎁 Premio:</strong> Jugadas gratis de S/ 5 para cualquier juego virtual.</div>
                    <div style="margin-bottom: 12px; line-height: 1.5; color: #ffffff;"><strong>🗓 Vigencia:</strong> De lunes a jueves, del 25/05 al 28/05.</div>
                    <div style="margin-bottom: 12px; line-height: 1.5; color: #ffffff;"><strong>📝 Mecánica de la Promo (Condiciones):</strong> El cliente debe presentar 5 tickets de juegos virtuales (ganados o perdidos) del mismo día, con un valor de S/5 o más cada uno. La jugada gratis se emite en un solo ticket por S/5, sin posibilidad de adicionar efectivo. Solo se permite 1 premio por cliente al día.</div>
                    <div style="margin-bottom: 12px; line-height: 1.5; color: #00ff88;"><strong>✅ Observación adicional:</strong> El registro se realiza en el segundo diamante de gestión, opción "Promo Retail por TK", ingresando DNI, proveedor Golden Race y los IDs de los tickets.</div>
                `,
                startDate: '2026-05-25',
                endDate: '2026-05-28',
                available: true
            },
            '2026-05-24': {
                name: 'PROMO CAMISETA DEL POLIAJUSTE',
                category: 'green',
                icon: '👕',
                description: 'Gana la camiseta oficial',
                htmlDetails: `
                    <div style="margin-bottom: 12px; line-height: 1.5; color: #ffffff;"><strong>🎁 Premio:</strong> 2 camisetas del Poliajuste por tienda (1 por cada sorteo).</div>
                    <div style="margin-bottom: 12px; line-height: 1.5; color: #ffffff;"><strong>🗓 Vigencia:</strong> Primer sorteo: 30/05/2026 (participan tickets emitidos del 24/05 al 30/05). Segundo sorteo: 06/06/2026 (participan tickets emitidos del 30/05 al 06/06).</div>
                    <div style="margin-bottom: 12px; line-height: 1.5; color: #ffffff;"><strong>📝 Mecánica de la Promo (Condiciones):</strong> El cliente debe depositar tickets de apuestas deportivas múltiples de S/5 o más, con mínimo 5 eventos. Debe escribir al reverso del ticket: Nombre completo, Número de DNI y Número de celular. Los sorteos serán presenciales en tienda. Solo 1 camiseta por cliente durante toda la promoción. Un cliente ganador del primer sorteo no podrá participar como ganador en el segundo.</div>
                    <div style="margin-bottom: 12px; line-height: 1.5; color: #00ff88;"><strong>✅ Observación adicional:</strong> Se valida que los tickets cumplan todas las condiciones antes del sorteo. El registro y participación aplica únicamente dentro de las fechas establecidas para cada sorteo.</div>
                `,
                startDate: '2026-05-24',
                endDate: '2026-06-06',
                available: true
            },
            '2026-06-12': {
                name: 'PROMO VALE COMBI',
                category: 'yellow',
                icon: '🎫',
                description: 'Llévate un vale para tus apuestas',
                startDate: '2026-06-10',
                endDate: '2026-06-20',
                available: false
            },
            '2026-06-15': {
                name: 'PROMO LA RACHA VIRTUALERA',
                category: 'blue',
                icon: '🔥',
                description: 'Demuestra tu racha en virtuales',
                startDate: '2026-06-15',
                endDate: '2026-06-25',
                available: false
            },
            '2026-05-20': {
                name: 'PROMO CUMPLEAÑERO – MAYO',
                category: 'red',
                icon: '🎂',
                description: 'Bono especial cumpleañeros de mayo',
                startDate: '2026-05-01',
                endDate: '2026-05-31',
                available: false
            },
            '2026-06-20': {
                name: 'PROMO RUTA DEL AJUSTE – FASE 3',
                category: 'green',
                icon: '🛣️',
                description: 'Tercera fase de la ruta',
                startDate: '2026-06-20',
                endDate: '2026-06-30',
                available: false
            },
            '2026-06-22': {
                name: 'LA ESCALERA DEL TÍO AT3',
                category: 'yellow',
                icon: '🪜',
                description: 'Sube la escalera y gana',
                startDate: '2026-06-22',
                endDate: '2026-07-05',
                available: false
            },
            '2026-06-25': {
                name: 'PROMO ÁLBUM MUNDIALISTA',
                category: 'blue',
                icon: '📖',
                description: 'Completa tu álbum',
                startDate: '2026-06-25',
                endDate: '2026-07-15',
                available: false
            }
        };

        let currentMonth = 5; // Junio (0-indexado)
        let currentYear = 2026;
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        // ==================== FUNCIONES PRINCIPALES ==================== 
        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();

            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            // Días vacíos al inicio
            for (let i = 0; i < (startingDayOfWeek === 0 ? 6 : startingDayOfWeek - 1); i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-cell empty';
                calendarDays.appendChild(emptyCell);
            }

            // Días del mes
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cellDate = new Date(currentYear, currentMonth, day);
                cellDate.setHours(0, 0, 0, 0);

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';

                if (cellDate.getTime() === today.getTime()) {
                    cell.classList.add('today');
                }

                const numberDiv = document.createElement('div');
                numberDiv.className = 'cell-number';
                numberDiv.textContent = day;
                cell.appendChild(numberDiv);

                const iconsDiv = document.createElement('div');
                iconsDiv.className = 'cell-icons';

                // Encontrar todas las promos activas en esta fecha específica
                const activePromos = Object.values(promotions).filter(promo => {
                    return dateStr >= promo.startDate && dateStr <= promo.endDate && promo.available !== false;
                });

                if (activePromos.length > 0) {
                    activePromos.forEach(promo => {
                        const iconSpan = document.createElement('span');
                        iconSpan.textContent = promo.icon;
                        iconSpan.style.cursor = 'pointer';
                        iconSpan.onclick = (e) => { e.stopPropagation(); showModal(promo); };
                        iconsDiv.appendChild(iconSpan);
                    });
                    cell.onclick = () => showModal(activePromos[0]);
                }

                cell.appendChild(iconsDiv);
                calendarDays.appendChild(cell);
            }
        }

        function renderPromotions() {
            const grid = document.getElementById('promotionsGrid');
            grid.innerHTML = '';

            Object.entries(promotions).forEach(([dateStr, promo]) => {
                const card = document.createElement('div');
                const isAvailable = promo.available !== false;
                
                card.className = `promotion-card ${promo.category} ${!isAvailable ? 'unavailable' : ''}`;
                
                if (isAvailable) {
                    card.onclick = () => showModal(promo);
                }

                card.innerHTML = `
                    <div class="promotion-icon">${promo.icon}</div>
                    <div class="promotion-info">
                        <div class="promotion-name">${promo.name}</div>
                        <div class="promotion-explore">• EXPLORAR</div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function showModal(promo) {
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').textContent = promo.name;

            const modalInfo = document.getElementById('modalInfo');
            
            if (promo.htmlDetails) {
                modalInfo.innerHTML = promo.htmlDetails;
            } else {
                modalInfo.innerHTML = `
                    <div class="modal-info-item">
                        <span class="modal-info-label">Icono:</span>
                        <span>${promo.icon}</span>
                    </div>
                    <div class="modal-info-item">
                        <span class="modal-info-label">Descripción:</span>
                        <span>${promo.description}</span>
                    </div>
                    <div class="modal-info-item">
                        <span class="modal-info-label">Inicio:</span>
                        <span>${formatDate(promo.startDate)}</span>
                    </div>
                    <div class="modal-info-item">
                        <span class="modal-info-label">Fin:</span>
                        <span>${formatDate(promo.endDate)}</span>
                    </div>
                `;
            }

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function previousMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            updateDisplay();
        }

        function nextMonth() {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('monthName').textContent = monthNames[currentMonth].toUpperCase();
            document.getElementById('yearName').textContent = currentYear;
            renderCalendar();
            renderPromotions();
        }

        function handleFilterChange(filter) {
            console.log('Filtro: ', filter);
            // Aquí se pueden agregar filtros por categoría
        }

        // ==================== INICIALIZACIÓN ==================== 
        window.addEventListener('load', () => {
            updateDisplay();
        });

        // Cerrar modal al hacer clic fuera
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
