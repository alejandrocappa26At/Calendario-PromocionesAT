<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APUESTA TOTAL - Dashboard Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #121212;
        }

        ::-webkit-scrollbar-thumb {
            background: #5a5a5a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b3b3b3;
        }

        /* ==================== HEADER ==================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #000000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-box {
            width: 140px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .titulo {
            font-size: 42px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 1px;
            margin: 0;
        }

        .apuesta {
            color: #e6e6e6;
        }

        .total {
            color: #ff3b30;
            text-shadow: 0 0 8px rgba(255, 59, 48, 0.4);
        }

        .subtitulo {
            color: #9e9e9e;
            font-size: 16px;
            margin-top: 8px;
            letter-spacing: 1px;
            font-style: italic;
            animation: pulseTextGlow 2s infinite ease-in-out;
        }

        @keyframes pulseTextGlow {
            0%, 100% {
                text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
                color: #9e9e9e;
            }
            50% {
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 25px rgba(255, 255, 255, 0.5);
                color: #ffffff;
            }
        }

        .emojis-neon {
            color: #e0aaff;
            font-size: 20px;
            margin-top: 6px;
            letter-spacing: 6px;
            text-align: left;
            animation: pulseNeonPurple 2s infinite ease-in-out;
        }

        @keyframes pulseNeonPurple {
            0%, 100% {
                text-shadow: 0 0 5px #e0aaff, 0 0 10px #c77dff;
                opacity: 0.8;
            }
            50% {
                text-shadow: 0 0 10px #e0aaff, 0 0 20px #c77dff, 0 0 30px #9d4edd, 0 0 40px #7b2cbf;
                opacity: 1;
            }
        }

        /* ==================== EFECTO CORAZONES ==================== */
        .heart-particle {
            position: fixed;
            font-size: 20px;
            pointer-events: none;
            animation: floatUpHeart 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 9999;
            text-shadow: 0 0 10px rgba(255, 0, 51, 0.8);
        }

        @keyframes floatUpHeart {
            0% { transform: translateY(0) scale(0.5) rotate(-10deg); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.5) rotate(20deg); opacity: 0; }
        }

        .header-right {
            display: flex;
            gap: 16px;
        }

        .header-btn {
            padding: 12px 24px;
            border-radius: 500px;
            background: #111111;
            cursor: pointer;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .header-btn.yellow {
            border: 1px solid #ffd700;
            color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2), inset 0 0 5px rgba(255, 215, 0, 0.1);
        }

        .header-btn.yellow:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 10px rgba(255, 215, 0, 0.3);
            background: #1a1a1a;
        }

        .header-btn.green {
            border: 1px solid #00FF9D;
            color: #00FF9D;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2), inset 0 0 5px rgba(0, 255, 157, 0.1);
        }

        .header-btn.green:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.6), inset 0 0 10px rgba(0, 255, 157, 0.3);
            background: #1a1a1a;
        }

        /* ==================== ANIMACIÓN SEÑALÉTICA (DATO AT - GRILLA) ==================== */
        @keyframes parpadeoSenaleticaGrilla {
            0%, 100% {
                background: transparent;
                box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
                color: #00FF9D;
                border-color: #00FF9D;
            }
            50% {
                background: rgba(0, 255, 157, 0.3);
                box-shadow: 0 0 25px rgba(0, 255, 157, 0.9), inset 0 0 15px rgba(0, 255, 157, 0.5);
                color: #ffffff;
                border-color: #ffffff;
            }
        }

        #btn-dato-grilla {
            animation: parpadeoSenaleticaGrilla 1.5s infinite;
            border-width: 2px;
        }

        #btn-dato-grilla i.fa-arrow-right {
            font-size: 18px; /* Flecha grande y visible */
            margin-left: 6px;
        }

        /* ==================== ANIMACIÓN SEÑALÉTICA (VOLVER AL CALENDARIO) ==================== */
        #btn-volver-grilla {
            animation: parpadeoSenaleticaGrilla 1.5s infinite;
            border-width: 2px;
            font-weight: 900;
        }

        #btn-volver-grilla i.fa-arrow-left {
            font-size: 18px; /* Flecha grande y visible */
            margin-right: 4px;
        }

        /* ==================== ANIMACIÓN SEÑALÉTICA (FIXTURE MUNDIAL) ==================== */
        @keyframes parpadeoSenaleticaMundial {
            0%, 100% {
                background: transparent;
                box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
                color: #ffd700;
                border-color: #ffd700;
            }
            50% {
                background: rgba(255, 215, 0, 0.3);
                box-shadow: 0 0 25px rgba(255, 215, 0, 0.9), inset 0 0 15px rgba(255, 215, 0, 0.5);
                color: #ffffff;
                border-color: #ffffff;
            }
        }

        #btn-fixture-mundial {
            animation: parpadeoSenaleticaMundial 1.5s infinite;
            border-width: 2px;
        }

        #btn-fixture-mundial i.fa-arrow-right {
            font-size: 18px; /* Flecha grande y visible */
            margin-left: 6px;
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* ==================== NAVEGACIÓN MESES ==================== */
        .month-navigation {
            text-align: left;
            margin-bottom: 30px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 16px;
        }

        .month-nav-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .month-nav-btn:hover {
            color: #ff3b30;
            text-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
        }

        .month-display {
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .month-display .month-name {
            color: #e6e6e6;
        }

        .month-display .month-year {
            color: #ff3b30;
        }

        /* ==================== ANIMACIÓN COPA DEL MUNDO ==================== */
        .world-cup-logo {
            height: 100px;
            width: auto;
            object-fit: contain;
            animation: rotateTrophy3D 4s ease-in-out infinite;
            transform-origin: center;
        }

        @keyframes rotateTrophy3D {
            0%, 100% {
                transform: perspective(500px) rotateY(-20deg);
                filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.4));
            }
            50% {
                transform: perspective(500px) rotateY(20deg);
                filter: drop-shadow(0 0 16px rgba(255, 215, 0, 0.8));
            }
        }

        /* ==================== PROMOCIONES ==================== */
        .promotions-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            font-style: italic;
            margin-bottom: 24px;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4), 0 0 24px rgba(255, 255, 255, 0.2);
        }

        .promotions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .promotion-card {
            background: #111111;
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #222222;
            position: relative;
        }

        .promotion-card:hover:not(.unavailable) {
            transform: translateY(-5px);
            filter: brightness(1.1);
        }

        .promotion-card.green {
            border-color: rgba(0, 255, 102, 0.3);
        }
        .promotion-card.green:hover:not(.unavailable) { 
            border-color: #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.6), 0 0 40px rgba(0, 255, 102, 0.4); 
        }
        .promotion-card.green .outline-icon {
            -webkit-text-stroke-color: #00ff66;
        }

        .promotion-card.yellow {
            border-color: rgba(255, 153, 0, 0.3); /* Naranja neón */
        }
        .promotion-card.yellow:hover:not(.unavailable) { 
            border-color: #ff9900;
            box-shadow: 0 0 20px rgba(255, 153, 0, 0.6), 0 0 40px rgba(255, 153, 0, 0.4); 
        }
        .promotion-card.yellow .outline-icon {
            -webkit-text-stroke-color: #ff9900;
        }

        .promotion-card.purple {
            border-color: rgba(157, 78, 221, 0.3);
        }
        .promotion-card.purple:hover:not(.unavailable) { 
            border-color: #9d4edd;
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.6), 0 0 40px rgba(157, 78, 221, 0.4); 
        }
        .promotion-card.purple .outline-icon {
            -webkit-text-stroke-color: #9d4edd;
        }

        .promotion-card.blue {
            border-color: rgba(0, 217, 255, 0.3);
        }
        .promotion-card.blue:hover:not(.unavailable) { 
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6), 0 0 40px rgba(0, 217, 255, 0.4); 
        }
        .promotion-card.blue .outline-icon {
            -webkit-text-stroke-color: #00d9ff;
        }

        .promotion-card.red {
            border-color: rgba(255, 0, 102, 0.3);
        }
        .promotion-card.red:hover:not(.unavailable) { 
            border-color: #ff0066;
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.6), 0 0 40px rgba(255, 0, 102, 0.4); 
        }
        .promotion-card.red .outline-icon {
            -webkit-text-stroke-color: #ff0066;
        }

        .promotion-card.orange {
            border-color: rgba(255, 153, 0, 0.3);
        }
        .promotion-card.orange:hover:not(.unavailable) { 
            border-color: #ff9900;
            box-shadow: 0 0 20px rgba(255, 153, 0, 0.6), 0 0 40px rgba(255, 153, 0, 0.4); 
        }
        .promotion-card.orange .outline-icon {
            -webkit-text-stroke-color: #ff9900;
        }

        .promotion-card.magenta {
            border-color: rgba(255, 20, 147, 0.3);
        }
        .promotion-card.magenta:hover:not(.unavailable) { 
            border-color: #ff1493;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.6), 0 0 40px rgba(255, 20, 147, 0.4); 
        }
        .promotion-card.magenta .outline-icon {
            -webkit-text-stroke-color: #ff1493;
        }

        .promotion-card.unavailable {
            border-color: #333333;
            box-shadow: none;
            opacity: 0.5;
            cursor: pointer;
            filter: grayscale(100%);
        }

        .promotion-card.unavailable .promotion-name {
            color: #888888;
        }

        /* ==================== BADGES PROMOCIONES ==================== */
        .promo-badge {
            position: absolute;
            top: -10px;
            right: 15px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }
        .promo-badge.expirado {
            background: #222;
            color: #888;
            border: 1px solid #444;
        }
        .promo-badge.canje {
            background: #ff9900;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 153, 0, 0.4);
        }
        .promo-badge.lima-only {
            background: #ff0066;
            color: #ffffff;
            box-shadow: 0 0 12px rgba(255, 0, 102, 0.6);
            border: 1px solid #ff4d94;
        }
        .promo-badge.activo {
            background: #00ff9d;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.6), 0 0 25px rgba(0, 255, 157, 0.4);
            border: 1px solid #fff;
            animation: pulse-green 1.5s infinite ease-in-out;
        }

        @keyframes pulse-green {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(0, 255, 157, 0.6);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 25px rgba(0, 255, 157, 1);
            }
        }
        .promo-badge.ultimo-dia {
            background: linear-gradient(45deg, #ff3b30, #ff9500);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 59, 48, 0.7), 0 0 25px rgba(255, 149, 0, 0.5);
            border: 1px solid #fff;
            animation: pulse-hot 1.2s infinite ease-in-out;
        }

        @keyframes pulse-hot {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(255, 59, 48, 0.7), 0 0 25px rgba(255, 149, 0, 0.5);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 25px rgba(255, 59, 48, 1), 0 0 40px rgba(255, 149, 0, 0.8);
            }
        }

        .promo-badge.proximo {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.8), 0 0 30px rgba(118, 75, 162, 0.6);
            border: 2px solid #fff;
            font-weight: 900;
            animation: pulse-proximo 1.3s infinite ease-in-out;
        }

        @keyframes pulse-proximo {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 20px rgba(102, 126, 234, 0.8), 0 0 30px rgba(118, 75, 162, 0.6);
            }
            50% {
                transform: scale(1.08);
                box-shadow: 0 0 30px rgba(102, 126, 234, 1), 0 0 50px rgba(118, 75, 162, 0.9);
            }
        }

        /* ==================== ICONOS OUTLINE (PREMIUM) ==================== */
        .outline-icon {
            color: transparent !important;
            -webkit-text-stroke: 1.5px #FFFFFF;
            font-size: 16px;
            text-shadow: none !important;
            background: transparent !important;
            box-shadow: none !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .promotion-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .promotion-card:hover:not(.unavailable) .promotion-icon {
            transform: scale(1.1);
        }

        .promotion-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }

        .promotion-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            font-weight: 500;
            font-style: italic;
            color: #ffffff;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .promotion-explore {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 700;
            font-weight: 500;
            font-style: italic;
            color: #888888;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            margin-top: 4px;
        }

        .promotion-card:hover:not(.unavailable) .promotion-explore {
            color: #ffffff;
        }

        /* ==================== CALENDARIO ==================== */
        .calendar-wrapper {
            background: #181818;
            border-radius: 8px;
            padding: 32px;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .calendar-day-name {
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            color: #b3b3b3;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-cell {
            aspect-ratio: 1;
            background: transparent;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: background-color 0.2s ease;
            position: relative;
            min-height: 80px;
            padding-top: 8px;
        }

        .calendar-cell:hover {
            background: #2a2a2a;
        }

        .calendar-cell.today {
            background: rgba(255, 255, 255, 0.05);
        }

        .calendar-cell.empty {
            cursor: default;
            background: transparent;
        }

        .calendar-cell.empty:hover {
            background: transparent;
        }

        .cell-number {
            font-size: 14px;
            font-weight: 700;
            color: #b3b3b3;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .calendar-cell.today .cell-number {
            color: #000000;
            background: #1ED760;
        }

        .cell-icons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px;
            font-size: 20px;
            margin-top: 4px;
        }
        
        .cell-icons .green .outline-icon { -webkit-text-stroke-color: #00ff66; }
        .cell-icons .yellow .outline-icon { -webkit-text-stroke-color: #ff9900; }
        .cell-icons .purple .outline-icon { -webkit-text-stroke-color: #9d4edd; }
        .cell-icons .blue .outline-icon { -webkit-text-stroke-color: #00d9ff; }
        .cell-icons .red .outline-icon { -webkit-text-stroke-color: #ff0066; }

        /* ==================== DATO AT - GRILLA PREMIUM ==================== */
        .grilla-view {
            animation: fadeIn 0.4s ease;
        }

        .grilla-header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .grilla-filters {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .grilla-search, .grilla-date {
            background: rgba(11, 11, 15, 0.8);
            border: 1px solid #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
        }

        .grilla-search:focus, .grilla-date:focus {
            border-color: #00D9FF;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .grilla-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .grilla-card {
            background: rgba(11, 11, 15, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        .grilla-card:hover {
            transform: translateY(-5px);
            border-color: #00FF9D;
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.15), inset 0 0 20px rgba(0, 255, 157, 0.05);
            background: rgba(11, 11, 15, 0.8);
        }
        
        .grilla-card.glow-red:hover { border-color: #FF0066; box-shadow: 0 10px 30px rgba(255, 0, 102, 0.15), inset 0 0 20px rgba(255, 0, 102, 0.05); }
        .grilla-card.glow-yellow:hover { border-color: #FFD700; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15), inset 0 0 20px rgba(255, 215, 0, 0.05); }
        .grilla-card.glow-blue:hover { border-color: #00D9FF; box-shadow: 0 10px 30px rgba(0, 217, 255, 0.15), inset 0 0 20px rgba(0, 217, 255, 0.05); }

        .grilla-badge-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .grilla-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

                if (promo.available === false) {
                    state = 'expirado';
                }
                
                card.className = `promotion-card ${promo.category}`;
                let badgeHtml = '';
                let exploreText = '• EXPLORAR';

                // Lógica para el badge de "Último Día"
                const isLastDay = (promo.endDate && systemDate === promo.endDate);
                const isLastCanjeDay = (promo.canjeDate && systemDate === promo.canjeDate);

                if (state === 'activo') {
                    card.onclick = () => showModal(promo);
                    if (promo.customBadgeText) {
                        badgeHtml = `<div class="promo-badge ${promo.customBadgeClass}">${promo.customBadgeText}</div>`;
                    } else {
                        badgeHtml = '<div class="promo-badge activo">ACTIVA</div>';
                    }
                } else if (state === 'canje') {
                    card.classList.add('canje-disponible');
                    badgeHtml = '<div class="promo-badge canje">CANJE DISPONIBLE</div>';
                    if (isLastCanjeDay) {
                        badgeHtml = '<div class="promo-badge ultimo-dia">🔥 ¡ÚLTIMO DÍA DE CANJE!</div>';
                    } else {
                        badgeHtml = '<div class="promo-badge canje">CANJE DISPONIBLE</div>';
                    }
                    card.onclick = () => showModal(promo);
                } else if (state === 'expirado') {
                    card.classList.add('unavailable');
                    badgeHtml = '<div class="promo-badge expirado">PROMOCIÓN EXPIRADA</div>';
                    exploreText = '• NO VIGENTE';
                    card.onclick = () => showModal(promo);
                } else if (state === 'proximamente') {
                    card.classList.add('unavailable');
                    badgeHtml = '<div class="promo-badge proximo">PRÓXIMAMENTE</div>';
                    exploreText = '• NO INICIADA';
                    card.onclick = () => showModal(promo);
                }

                // Prioridad al badge de "Último Día" si la promo está activa
                if (state === 'activo' && isLastDay) {
                    badgeHtml = '<div class="promo-badge ultimo-dia">🔥 ¡ÚLTIMO DÍA!</div>';
                }

                card.innerHTML = `
                    ${badgeHtml}
                    <div class="promotion-icon">${promo.icon}</div>
                    <div class="promotion-info">
                        <div class="promotion-name">${promo.name}</div>
                        <div class="promotion-explore">${exploreText}</div>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function showModal(data, dateStr = null) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            const iconWrapper = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalInfo = document.getElementById('modalInfo');
            
            // Limpiar colores anteriores del modal
            modalContent.classList.remove('green', 'yellow', 'purple', 'blue', 'red', 'multi');

            modalInfo.innerHTML = '';

            if (Array.isArray(data)) {
                // Mostrar múltiples promociones (click en un día del calendario)
                modalTitle.textContent = `Promociones del ${formatDate(dateStr)}`;
                if (iconWrapper) iconWrapper.innerHTML = '<i class="fa-solid fa-layer-group" style="font-size: 24px; color: #fff;"></i>';
                
                // Color neón base cuando se muestran múltiples promociones
                modalContent.classList.add('multi');
                
                const categoryColors = {
                    green: '#00ff66',
                    yellow: '#ff9900',
                    purple: '#9d4edd',
                    blue: '#00d9ff',
                    red: '#ff0066'
                };

                const multiHeader = document.createElement('div');
                multiHeader.style.marginBottom = '20px';
                multiHeader.style.color = '#ddd';
                multiHeader.style.fontSize = '14px';
                multiHeader.style.textAlign = 'center';
                multiHeader.style.background = 'rgba(255,255,255,0.05)';
                multiHeader.style.padding = '12px';
                multiHeader.style.borderRadius = '12px';
                multiHeader.style.border = '1px solid rgba(255,255,255,0.1)';
                multiHeader.innerHTML = `🌟 Hay <strong>${data.length} promociones</strong> vigentes en esta fecha.`;
                modalInfo.appendChild(multiHeader);

                data.forEach((promo, index) => {
                    const promoColor = categoryColors[promo.category] || '#00ff88';
                    const promoBlock = document.createElement('div');
                    promoBlock.className = `multi-block ${promo.category}`;
                    promoBlock.style.marginBottom = index < data.length - 1 ? '24px' : '0';
                    promoBlock.style.padding = '24px 20px 20px 20px';
                    promoBlock.style.borderRadius = '16px';
                    promoBlock.style.border = `1px solid ${promoColor}60`;
                    promoBlock.style.background = `rgba(11, 11, 15, 0.6)`;
                    promoBlock.style.position = 'relative';
                    promoBlock.style.boxShadow = `0 4px 20px ${promoColor}15`;

                    let details = promo.htmlDetails ? promo.htmlDetails : `
                        <div class="promo-section">
                            <div class="promo-section-title"><i class="fa-solid fa-trophy outline-icon"></i> Descripción</div>
                            <div class="promo-section-content">${promo.description}</div>
                        </div>
                        <div class="promo-section">
                            <div class="promo-section-title"><i class="fa-solid fa-clock outline-icon"></i> Inicio</div>
                            <div class="promo-section-content">${formatDate(promo.startDate)}</div>
                        </div>
                        <div class="promo-section">
                            <div class="promo-section-title"><i class="fa-solid fa-clock outline-icon"></i> Fin</div>
                            <div class="promo-section-content">${formatDate(promo.endDate)}</div>
                        </div>
                    `;

                    promoBlock.innerHTML = `
                        <div style="position: absolute; top: -12px; left: 20px; background: #0b0b0b; padding: 2px 12px; color: ${promoColor}; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; border: 1px solid ${promoColor}80; border-radius: 50px;">Promoción ${index + 1}</div>
                        <h3 style="color: ${promoColor}; font-family: 'Montserrat', sans-serif; font-size: 16px; margin-bottom: 16px; margin-top: 4px; display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px ${promoColor}40;">
                            <span style="font-size: 20px;">${promo.icon}</span> ${promo.name}
                        </h3>
                        <div style="display: flex; flex-direction: column; gap: 12px;">
                            ${details}
                        </div>
                    `;
                    modalInfo.appendChild(promoBlock);
                });
            } else {
                // Mostrar una sola promoción (click directo en la tarjeta o en el ícono)
                const promo = data;
                modalTitle.textContent = promo.name;
                if (iconWrapper) iconWrapper.innerHTML = promo.icon;

                // Asignar dinámicamente el color según la promoción que eligió
                modalContent.classList.add(promo.category);

                if (promo.htmlDetails) {
                    modalInfo.innerHTML = promo.htmlDetails;
                } else {
                    modalInfo.innerHTML = `
                        <div class="promo-section">
                            <div class="promo-section-title"><i class="fa-solid fa-trophy outline-icon"></i> Descripción</div>
                            <div class="promo-section-content">${promo.description}</div>
                        </div>
                        <div class="promo-section">
                            <div class="promo-section-title"><i class="fa-solid fa-clock outline-icon"></i> Inicio</div>
                            <div class="promo-section-content">${formatDate(promo.startDate)}</div>
                        </div>
                        <div class="promo-section">
                            <div class="promo-section-title"><i class="fa-solid fa-clock outline-icon"></i> Fin</div>
                            <div class="promo-section-content">${formatDate(promo.endDate)}</div>
                        </div>
                        <div class="promo-section highlight">
                            <div class="promo-section-title"><i class="fa-solid fa-location-dot outline-icon"></i> Observación</div>
                            <div class="promo-section-content">Promoción sujeta a términos y condiciones generales de Apuesta Total.</div>
                        </div>
                    `;
                }
            }

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            const date = new Date(year, month - 1, day);
            return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function previousMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            updateDisplay();
        }

        function nextMonth() {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('monthName').textContent = monthNames[currentMonth].toUpperCase();
            document.getElementById('yearName').textContent = currentYear;
            renderCalendar();
            renderPromotions();
        }

        // ==================== LÓGICA DE GRILLA PREMIUM ==================== 
        let countdownInterval;

        function toggleGrillaView(show) {
            const homeView = document.getElementById('homeView');
            const grillaView = document.getElementById('grillaView');
            
            if (show) {
                homeView.style.display = 'none';
                grillaView.style.display = 'block';
                
                renderGrilla();
                startCountdown();
            } else {
                homeView.style.display = 'block';
                grillaView.style.display = 'none';
                if (countdownInterval) clearInterval(countdownInterval);
            }
        }

        function renderGrilla() {
            const grid = document.getElementById('grillaGrid');
            const searchTerm = document.getElementById('grillaSearch').value.toLowerCase();
            const filterDate = document.getElementById('grillaDate').value;
            
            grid.innerHTML = '';
            const now = new Date(); // Usando hora real del sistema
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = `${tomorrow.getFullYear()}-${String(tomorrow.getMonth()+1).padStart(2,'0')}-${String(tomorrow.getDate()).padStart(2,'0')}`;

            let filtered = grillaEvents.filter(ev => {
                const [year, month, day] = ev.date.split('-');
                const [hours, mins] = ev.time.split(':');
                const eventDate = new Date(year, month - 1, day, hours, mins);
                
                // Oculta eventos que finalizaron hace más de 4 horas
                const eventEnd = new Date(eventDate.getTime() + (4 * 60 * 60 * 1000));
                if (eventEnd < now) return false;
                
                if (searchTerm && !ev.t1.toLowerCase().includes(searchTerm) && !ev.t2.toLowerCase().includes(searchTerm)) return false;
                if (filterDate && ev.date !== filterDate) return false;
                return true;
            });

            filtered.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: #888; font-size: 16px;">No hay eventos deportivos disponibles o todos han finalizado.</div>';
                return;
            }

            filtered.forEach((ev, index) => {
                let badgeHtml = ev.date === todayStr ? '<span class="grilla-badge badge-hoy">HOY</span>' : 
                                (ev.date === tomorrowStr ? '<span class="grilla-badge badge-manana">MAÑANA</span>' : 
                                '<span class="grilla-badge badge-proximo">PRÓXIMO</span>');
                
                let glowClass = ev.importance === 'high' ? 'glow-red' : (ev.importance === 'medium' ? 'glow-yellow' : 'glow-blue');
                let iconLabel = ev.importance === 'high' ? '<i class="fa-solid fa-bolt outline-icon"></i> EVENTO DESTACADO' : (ev.importance === 'medium' ? '<i class="fa-solid fa-bullseye outline-icon"></i> EVENTO CLAVE' : '<i class="fa-solid fa-star outline-icon"></i> PARTIDO OFICIAL');
                let iconColor = ev.importance === 'high' ? '#FF0066' : (ev.importance === 'medium' ? '#FFD700' : '#00D9FF');

                const displayDate = new Date(ev.date + "T00:00:00").toLocaleDateString('es-ES', { weekday: 'long', day: '2-digit' }).replace(/^\w/, c => c.toUpperCase());

                grid.innerHTML += `
                    <div class="grilla-card ${glowClass}" style="animation-delay: ${index * 0.1}s">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px;">
                            <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
                                <div class="grilla-header-title" style="color: ${iconColor};">${iconLabel}</div>
                                <div class="grilla-badge-container">${badgeHtml}</div>
                            </div>
                            <div class="grilla-countdown" data-target="${ev.date}T${ev.time}">Cargando...</div>
                        </div>
                        
                        <div class="grilla-datetime">
                            <span><i class="fa-solid fa-calendar-day"></i> ${displayDate}</span>
                            <span><i class="fa-solid fa-clock"></i> ${ev.time}</span>
                        </div>

                        <div class="grilla-teams">
                            <div class="grilla-team"><img src="https://flagcdn.com/w80/${ev.f1}.png" class="grilla-flag"><span class="grilla-team-name">${ev.t1}</span></div>
                            <div class="grilla-vs">VS</div>
                            <div class="grilla-team"><img src="https://flagcdn.com/w80/${ev.f2}.png" class="grilla-flag"><span class="grilla-team-name">${ev.t2}</span></div>
                        </div>

                        <div>
                            <div class="grilla-section-title"><i class="fa-solid fa-tv outline-icon"></i> Transmisión:</div>
                            <div class="grilla-tv">${ev.tv.map(c => `<span>${c}</span>`).join('')}</div>
                        </div>

                        <div>
                            <div class="grilla-section-title"><i class="fa-solid fa-book-open outline-icon"></i> DATO AT</div>
                            <ul class="grilla-list">${ev.datos.map(d => `<li><i class="fa-solid fa-caret-right"></i> ${d}</li>`).join('')}</ul>
                        </div>

                        <div>
                            <div class="grilla-section-title"><i class="fa-solid fa-bullseye outline-icon"></i> Mercados a incentivar</div>
                            <ul class="grilla-list">${ev.mercados.map(m => `<li><i class="fa-solid fa-bolt"></i> ${m}</li>`).join('')}</ul>
                        </div>
                    </div>
                `;
            });
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                document.querySelectorAll('.grilla-countdown').forEach(el => {
                    const target = new Date(el.dataset.target).getTime();
                    const distance = target - now;
                    if (distance < 0) {
                        if (distance < -7200000) { // Si pasaron 2 horas, está finalizado
                            el.innerHTML = "FINALIZADO";
                            el.style.color = "#1ED760";
                            el.style.borderColor = "rgba(30, 215, 96, 0.4)";
                        } else {
                            el.innerHTML = "¡EN VIVO!";
                            el.style.color = "#FF0066";
                            el.style.borderColor = "rgba(255, 0, 102, 0.4)";
                        }
                    } else {
                        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((distance % (1000 * 60)) / 1000);
                        el.innerHTML = `⏳ ${d}d ${h}h ${m}m ${s}s`;
                    }
                });
            }, 1000);
        }

        // ==================== INICIALIZACIÓN ==================== 
        window.addEventListener('load', () => {
            updateDisplay();
        });

        // Cerrar modal al hacer clic fuera
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });

        // ==================== EFECTO CORAZONES (PISCIS) ====================
        // ==================== EFECTO CORAZONES (ARIES) ====================
        // ==================== EFECTO CORAZONES (VIRGO) ====================
        function spawnHearts(e) {
            const numHearts = 8;
            for (let i = 0; i < numHearts; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart-particle';
                
                // Posición aleatoria alrededor de la zona del click
                const offsetX = (Math.random() - 0.5) * 60;
                const offsetY = (Math.random() - 0.5) * 60;
                
                heart.style.left = (e.clientX + offsetX - 10) + 'px';
                heart.style.top = (e.clientY + offsetY - 10) + 'px';
                
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 1200); // Se elimina del DOM al terminar la animación
            }
        }
    </script>
</body>
</html>
