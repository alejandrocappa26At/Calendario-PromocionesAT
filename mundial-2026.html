        }

        .date-group {

        }

        .date-title {

            padding: 15px 20px;
            border-left: 4px solid #1DB954;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .match-card {
            background: #121212;
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .match-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: #ffd700;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .match-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.5);
            background: #1a1a1a;
        }

        .match-card:hover::before {
            opacity: 1;
        }

        .match-info {
            flex: 1;
        }

        .match-teams {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .match-group {
            color: #1DB954;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            background: rgba(29, 185, 84, 0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .match-details {
            text-align: right;
            min-width: 150px;
        }

        .match-time {
            font-size: 24px;
            font-weight: 800;
            color: #ffd700;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }

        .match-tv {
            font-size: 13px;
            color: #aaa;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 5px;
        }

        @media (max-width: 600px) {
            .match-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .match-details {
                text-align: left;
                width: 100%;
                border-top: 1px solid rgba(255,255,255,0.1);
                padding-top: 10px;
            }
            .match-time, .match-tv {
                justify-content: flex-start;
            }
        }

            overflow-y: auto;
            flex: 1;
            padding-right: 10px;
        }
    </style>
</head>
