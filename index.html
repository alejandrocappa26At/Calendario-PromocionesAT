<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuesta Total Calendar - Febrero 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0D0D0D 0%, #1A1A1A 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: #121212;
            box-shadow: 0 0 100px rgba(231, 76, 60, 0.2);
            overflow: auto;
            width: 95vw;
            height: 95vh;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            border: 2px solid #E74C3C;
            border-radius: 12px;
        }

        .header {
            background: linear-gradient(90deg, #121212 0%, #1A1A1A 100%);
            border-bottom: 3px solid #E74C3C;
            color: white;
            padding: 20px 30px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 2.2em;
            margin: 0;
            font-weight: 700;
            letter-spacing: 3px;
            color: #E74C3C;
            flex: 1;
        }

        .header p {
            font-size: 1em;
            opacity: 0.8;
            position: absolute;
            right: 30px;
            margin: 0;
        }

        .calendar {
            padding: 25px 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 0;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .weekday {
            text-align: center;
            font-weight: 700;
            color: #E74C3C;
            padding: 8px 4px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(231, 76, 60, 0.05);
            border-radius: 6px;
            border: 1px solid #E74C3C;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            grid-auto-rows: minmax(60px, 1fr);
            flex: 1;
            overflow-y: auto;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: #1A1A1A;
            color: #E0E0E0;
            border: 2px solid #333;
            font-size: 1.1em;
            position: relative;
            min-height: 60px;
        }

        .day:hover {
            background: linear-gradient(135deg, #252525 0%, #1A1A1A 100%);
            transform: translateY(-2px) scale(1.05);
            border-color: #E74C3C;
            box-shadow: 0 6px 15px rgba(231, 76, 60, 0.25);
        }

        .day.empty {
            background: transparent;
            cursor: default;
            color: ccc;
            border: none;
        }

        .day.empty:hover {
            background: transparent;
            transform: scale(1);
            border: none;
            box-shadow: none;
        }

        .day.today {
            background: linear-gradient(135deg, #E74C3C 0%, #C9281C 100%);
            color: white;
            font-weight: 700;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 2px solid #FF6B5B;
            position: relative;
            overflow: hidden;
        }

        .day.today::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translate(0, 0); }
            50% { transform: translate(10px, 10px); }
            100% { transform: translate(0, 0); }
        }

        .day.today:hover {
            transform: translateY(-4px) scale(1.1);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 1);
        }

        .day.weekend {
            color: #FF9A8B;
            font-weight: 600;
        }

        /* Scrollbar personalizado */
        .days::-webkit-scrollbar {
            width: 8px;
        }

        .days::-webkit-scrollbar-track {
            background: #1A1A1A;
        }

        .days::-webkit-scrollbar-thumb {
            background: #E74C3C;
            border-radius: 4px;
        }

        .days::-webkit-scrollbar-thumb:hover {
            background: #FF6B5B;
        }

        .footer {
            background: #1A1A1A;
            padding: 12px;
            text-align: center;
            color: #B0B0B0;
            font-size: 0.9em;
            border-top: 2px solid #E74C3C;
            flex-shrink: 0;
        }

        @media (max-width: 1200px) {
            .header h1 {
                font-size: 2.2em;
            }

            .header p {
                font-size: 1em;
            }

            .calendar {
                padding: 30px;
            }

            .day {
                font-size: 1.1em;
            }
        }

        @media (max-width: 768px) {
            .container {
                width: 98vw;
                height: 98vh;
            }

            .header {
                padding: 15px 20px;
                flex-direction: column;
            }

            .header h1 {
                font-size: 2em;
            }

            .header p {
                position: static;
                margin-top: 10px;
            }

            .calendar {
                padding: 20px;
            }

            .weekday {
                font-size: 0.9em;
                padding: 8px;
            }

            .day {
                font-size: 1em;
            }

            .days {
                gap: 10px;
                grid-auto-rows: minmax(60px, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>FEBRERO 2026</h1>
            <p>🎰 Apuesta Total Calendar</p>
        </div>

        <div class="calendar">
            <div class="weekdays">
                <div class="weekday">Lun</div>
                <div class="weekday">Mar</div>
                <div class="weekday">Mié</div>
                <div class="weekday">Jue</div>
                <div class="weekday">Vie</div>
                <div class="weekday">Sab</div>
                <div class="weekday">Dom</div>
            </div>

            <div class="days" id="calendar-days">
                <!-- Los días se generarán con JavaScript -->
            </div>
        </div>

        <div class="footer">
            <p>📍 Hoy es 2 de febrero de 2026</p>
        </div>
    </div>

    <script>
        function generarCalendario() {
            const year = 2026;
            const month = 1; // Febrero (0-indexado)
            
            const primerDia = new Date(year, month, 1);
            const ultimoDia = new Date(year, month + 1, 0);
            const diasDelMes = ultimoDia.getDate();
            const diaInicio = primerDia.getDay();
            
            const calendarDays = document.getElementById('calendar-days');
            calendarDays.innerHTML = '';

            // Días vacíos al inicio
            const diasVaciosInicio = diaInicio === 0 ? 6 : diaInicio - 1;
            for (let i = 0; i < diasVaciosInicio; i++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day empty';
                dayEl.textContent = '';
                calendarDays.appendChild(dayEl);
            }

            // Días del mes
            for (let día = 1; día <= diasDelMes; día++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.textContent = día;

                // Marcar hoy (2 de febrero)
                if (día === 2) {
                    dayEl.classList.add('today');
                }

                // Marcar fines de semana (sábados y domingos)
                const fechaActual = new Date(year, month, día);
                const diaDelaSemana = fechaActual.getDay();
                if (diaDelaSemana === 0 || diaDelaSemana === 6) {
                    dayEl.classList.add('weekend');
                }

                calendarDays.appendChild(dayEl);
            }
        }

        generarCalendario();
    </script>
</body>
</html>
