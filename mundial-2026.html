<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture Mundial 2026 - Apuesta Total</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', sans-serif;
        }

        /* ==================== NUEVOS BOTONES Y FILTROS ==================== */
        .btn-neon-green {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 224, 90, 0.1);
        }
        .btn-neon-green:hover {
            background: rgba(0, 224, 90, 0.1);
            box-shadow: 0 0 20px rgba(0, 224, 90, 0.4);
            transform: translateY(-2px);
        }
        .date-filter-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #111;
            border: 1px solid #333;
            padding: 8px 16px;
            border-radius: 50px;
            transition: var(--transition);
        }
        .date-filter-container:focus-within {
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 224, 90, 0.1);
        }
        .date-filter-container input[type="date"] {
            background: transparent;
            border: none;
            color: var(--text-white);
            outline: none;
            color-scheme: dark;
            font-weight: 600;
            cursor: pointer;
        }

        /* ==================== ANIMACIÓN SEÑALÉTICA (VOLVER) ==================== */
        @keyframes parpadeoSenaletica {
            0%, 100% {
                background: transparent;
                box-shadow: 0 0 10px rgba(0, 224, 90, 0.2);
                color: var(--neon-green);
                border-color: var(--neon-green);
            }
            50% {
                background: rgba(0, 224, 90, 0.3);
                box-shadow: 0 0 25px rgba(0, 224, 90, 0.9), inset 0 0 15px rgba(0, 224, 90, 0.5);
                color: #ffffff;
                border-color: #ffffff;
            }
        }

        #btn-volver-calendario {
            animation: parpadeoSenaletica 1.5s infinite;
            border-width: 2px;
            font-weight: 900;
        }

        #btn-volver-calendario i {
            font-size: 18px; /* Flecha más grande y visible */
            margin-right: 4px;
        }

        /* ==================== VARIABLES Y GLOBALES ==================== */
        :root {
            --bg-deep: #000000;
            --panel-grad-1: #111111;
            --panel-grad-2: #1A1A1A;
            --neon-green: #00E05A;
            --text-white: #FFFFFF;
            --text-grey: #AAAAAA;
            --border-radius: 20px;
            --card-radius: 18px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            background: var(--bg-deep);
            color: var(--text-white);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-green); }

        /* ==================== SIDEBAR ==================== */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--panel-grad-1), var(--panel-grad-2));
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            color: var(--text-white);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .logo img {
            height: 48px;
            width: auto;
            object-fit: contain;
        }

        .btn-informate {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 224, 90, 0.4);
            transition: var(--transition);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-informate:hover, .btn-informate.active {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(0, 224, 90, 0.6);
            background: #00ff66;
        }

        .sidebar-section {
            margin-bottom: 30px;
        }

        .sidebar-section h3 {
            font-size: 12px;
            color: var(--text-grey);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid #333;
            color: var(--text-white);
            padding: 8px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-size: 13px;
        }

        .nav-btn:hover, .nav-btn.active {
            border-color: var(--neon-green);
            color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 224, 90, 0.2);
            background: rgba(0, 224, 90, 0.05);
        }

        .phases-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .phases-list .nav-btn {
            text-align: left;
            padding: 10px 16px;
            border-radius: 10px;
        }

        .custom-select {
            width: 100%;
            background: var(--bg-deep);
            border: 1px solid #333;
            color: var(--text-white);
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .custom-select:hover, .custom-select:focus {
            border-color: var(--neon-green);
        }

        /* ==================== MAIN CONTENT ==================== */
        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-deep);
            overflow: hidden;
        }

        .top-bar {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-grey);
        }

        .search-box input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: var(--text-white);
            padding: 12px 16px 12px 40px;
            border-radius: 50px;
            font-size: 14px;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--neon-green);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 224, 90, 0.1);
        }

        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i {
            color: var(--neon-green);
        }

        /* ==================== GRID & CARDS ==================== */
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        .match-card {
            background: linear-gradient(145deg, var(--panel-grad-1), var(--panel-grad-2));
            border-radius: var(--card-radius);
            padding: 24px;
            border: 1px solid #222;
            transition: var(--transition);
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .match-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 224, 90, 0.15);
            border-color: rgba(0, 224, 90, 0.4);
        }

        /* ==================== BADGE FINALIZADO ==================== */
        .badge-container {
            position: absolute;
            top: -12px;
            right: -12px;
            background: #121212;
            border-radius: 50px;
            z-index: 10;
            display: flex;
            align-items: stretch;
            border: 1px solid #1ED760;
            box-shadow: 0 0 15px rgba(30, 215, 96, 0.4);
            animation: popIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards, spotifyGlow 2s infinite alternate;
            overflow: hidden;
        }

        .badge-finalizado {
            color: #1ED760;
            padding: 6px 12px;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-score {
            background: rgba(30, 215, 96, 0.15);
            color: #ffffff;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid rgba(30, 215, 96, 0.4);
            letter-spacing: 2px;
        }

        @keyframes spotifyGlow {
            0% { box-shadow: 0 0 8px rgba(30, 215, 96, 0.3), inset 0 0 5px rgba(30, 215, 96, 0.1); }
            100% { box-shadow: 0 0 20px rgba(30, 215, 96, 0.8), inset 0 0 10px rgba(30, 215, 96, 0.4); }
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .teams-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 16px;
        }

        .flag {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #111;
        }

        .flag img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .next-match-card {
            background: rgba(0, 224, 90, 0.05);
            border: 1px solid rgba(0, 224, 90, 0.2);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .next-match-card.finished {
            position: relative;
            overflow: hidden;
        }

        .next-match-card.finished > *:not(.finished-overlay) {
            filter: grayscale(1) blur(1px);
            opacity: 0.4;
            transition: all 0.3s ease;
        }

        .finished-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 224, 90, 0.05);
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .finished-badge {
            background: var(--neon-green);
            color: #000;
            padding: 5px 12px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(0, 224, 90, 0.7);
            transform: rotate(-10deg);
            animation: popIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .next-match-teams {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .next-match-teams .flag {
            width: 28px;
            height: 28px;
        }

        .vs-text {
            font-weight: 900;
            color: var(--neon-green);
            font-size: 18px;
            font-style: italic;
            text-shadow: 0 0 10px rgba(0, 224, 90, 0.8), 0 0 20px rgba(0, 224, 90, 0.4);
            letter-spacing: 1px;
        }

        .next-match-info {
            font-size: 11px;
            color: var(--text-grey);
            font-weight: 600;
        }

        .teams-names {
            text-align: center;
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .match-meta {
            text-align: center;
            color: var(--text-grey);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .match-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-white);
        }

        .match-footer i {
            color: var(--neon-green);
            margin-right: 6px;
        }

        /* ==================== STORYTELLING PANEL ==================== */
        .story-container {
            display: flex;
            flex-direction: column;
            gap: 32px;
            padding-bottom: 40px;
        }

        .story-section {
            background: linear-gradient(145deg, rgba(17, 17, 17, 0.8), rgba(26, 26, 26, 0.8));
            border: 1px solid #222;
            border-radius: 24px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .hidden-scroll {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .hidden-scroll.show {
            opacity: 1;
            transform: translateY(0);
        }

        .story-title {
            font-size: 26px;
            font-weight: 900;
            color: var(--neon-green);
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }

        .story-text {
            font-size: 15px;
            color: #ddd;
            line-height: 1.8;
            margin-bottom: 24px;
        }

        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .story-card {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 24px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .story-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--neon-green);
            box-shadow: 0 10px 30px rgba(0, 224, 90, 0.15);
        }

        .story-card-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .story-quote {
            font-size: 22px;
            font-style: italic;
            font-weight: 800;
            color: #fff;
            padding: 24px 32px;
            border-left: 4px solid var(--neon-green);
            background: linear-gradient(90deg, rgba(0,224,90,0.1), transparent);
            border-radius: 0 16px 16px 0;
            margin: 24px 0;
        }

        .bracket-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
        }

        .bracket-icon {
            font-size: 64px;
            color: var(--neon-green);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(0,224,90,0.4));
        }

        /* ==================== RESPONSIVO ==================== */
        @media (max-width: 1200px) {
            .matches-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 992px) {
            .matches-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .main-wrapper { overflow: visible; }
            .sidebar { 
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #222;
                padding: 16px;
            }
            .matches-grid { grid-template-columns: 1fr; }
            .top-bar { flex-direction: column; gap: 16px; padding: 16px; }
            .search-box { width: 100%; }
            .content-area { padding: 20px; overflow-y: visible; }
        }
    </style>
</head>

                <option>PROGRAMACIÓN</option>
                <option>RESULTADOS</option>

            <div id="main-display">
                <div class="matches-grid" id="matches-grid">
                    <!-- Partidos inyectados por JS -->
                </div>
            </div>
        </div>
    </main>

        function renderMatches(matches, isKnockout = false) {
            mainDisplay.innerHTML = '<div class="matches-grid" id="matches-grid"></div>';
            const currentGrid = document.getElementById('matches-grid');

            if (matches.length === 0) {
                currentGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-grey); padding: 40px;">No se encontraron partidos para tu búsqueda.</p>`;
                return;
            }

            const now = new Date(); // Usa la fecha y hora real del sistema

            matches.forEach((m, index) => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.style.animationDelay = `${index * 0.05}s`;

                // Validar si es TBD (Knockout) o Bandera oficial
                const flag1Html = m.f1 === 'tbd' ? '<i class="fa-solid fa-shield" style="color: #444; font-size: 16px;"></i>' : `<img src="https://flagcdn.com/w80/${m.f1}.png" alt="${m.t1}">`;
                const flag2Html = m.f2 === 'tbd' ? '<i class="fa-solid fa-shield" style="color: #444; font-size: 16px;"></i>' : `<img src="https://flagcdn.com/w80/${m.f2}.png" alt="${m.t2}">`;

                // ==================== LÓGICA DE PARTIDOS EN VIVO Y FINALIZADOS ====================
                let statusBadgeHtml = '';
                const uniqueBadgeId = `badge-match-${index}-${Math.random().toString(36).substr(2, 9)}`;
                const monthMap = {"ENE":0, "FEB":1, "MAR":2, "ABR":3, "MAY":4, "JUN":5, "JUL":6, "AGO":7, "SEP":8, "OCT":9, "NOV":10, "DIC":11};
                const dateParts = m.date.split(' ');
                
                let isMatchStarted = false;
                let isFinished = false;

                if (dateParts.length === 2 && m.time !== "Por definir") {
                    // El torneo es en 2026, así que fijamos el año correctamente
                    const matchDate = new Date(2026, monthMap[dateParts[1]], parseInt(dateParts[0]));
                    const [hours, mins] = m.time.split(':');
                    matchDate.setHours(parseInt(hours), parseInt(mins), 0, 0);
                    
                    // El partido se considera finalizado ~2 horas después de su inicio programado
                    const matchEndTime = new Date(matchDate.getTime() + (2 * 60 * 60 * 1000));

                    // Si el partido ya comenzó (ahora >= hora de inicio)
                    if (now >= matchDate) {
                        isMatchStarted = true;
                        isFinished = now >= matchEndTime;
                        
                        const badgeClass = isFinished ? 'badge-finalizado' : 'badge-envivo';
                        const badgeColor = isFinished ? '#1ED760' : '#FF0066';
                        const badgeIcon = isFinished ? '<i class="fa-solid fa-circle-check"></i> FINALIZADO' : '<i class="fa-solid fa-circle-play"></i> EN VIVO';
                        const glowAnim = isFinished ? 'spotifyGlow' : 'liveGlow';

                        statusBadgeHtml = `
                            <div class="badge-container" id="${uniqueBadgeId}" style="border-color: ${badgeColor}; animation: popIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards, ${glowAnim} 2s infinite alternate;">
                                <div class="${badgeClass}">
                                    ${badgeIcon}
                                </div>
                            </div>
                        `;
                    }
                }

                // Textos dinámicos
                const metaText = isKnockout ? `Partido ${m.matchId} — ${m.city}` : `Grupo ${m.group} — ${m.city}`;
                const tvHtml = m.tv ? `<div style="width: 100%; text-align: center; color: var(--neon-green); background: rgba(0,224,90,0.1); padding: 4px; border-radius: 4px; margin-top: 6px;"><i class="fa-solid fa-tv"></i> ${m.tv}</div>` : '';

            // 3. Reactivar el buscador de texto
            document.getElementById('search-input').addEventListener('input', (e) => {
                const text = e.target.value.toLowerCase();
                if(text.trim() !== "") {
                    clearActiveButtons();
                    sectionTitle.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Resultados de Búsqueda';
                    const filtered = matchesData.filter(m => 
                        m.t1.toLowerCase().includes(text) || m.t2.toLowerCase().includes(text) ||
                        m.city.toLowerCase().includes(text) || m.group.toLowerCase().includes(text)
                    );
                    renderMatches(filtered);
                } else {
                    document.getElementById('btn-informate').click();
                }
            });

            // 4. Asignar Eventos a los nuevos botones
            document.getElementById('btn-volver-calendario').addEventListener('click', () => {
                window.location.href = 'apuesta-total-dashboard.html';
            });

            document.getElementById('btn-clear-sidebar').addEventListener('click', () => {
                clearActiveButtons();
                document.getElementById('search-input').value = '';
                document.getElementById('date-filter').value = '';
                document.getElementById('sedes-select').value = 'all';
                sectionTitle.innerHTML = '<i class="fa-solid fa-calendar-days"></i> Todos los Partidos';
                renderMatches(matchesData);
            });

            // 5. Asignar Evento al filtro de Fecha
            document.getElementById('date-filter').addEventListener('change', (e) => {
                const dateVal = e.target.value; 
                if(!dateVal) {
                    document.getElementById('btn-informate').click();
                    return;
                }
                
                const parts = dateVal.split('-');
                const day = parts[2];
                const month = parts[1] === '06' ? 'JUN' : (parts[1] === '07' ? 'JUL' : '');
                
                if(month) {
                    const formattedDate = day + " " + month;
                    clearActiveButtons();
                    document.getElementById('search-input').value = '';
                    sectionTitle.innerHTML = '<i class="fa-solid fa-calendar-day"></i> Partidos del ' + formattedDate;
                    
                    let filtered = matchesData.filter(m => m.date === formattedDate);
                    let isKnockoutMatch = false;
                    
                    if (filtered.length === 0 && typeof knockoutData !== 'undefined') {
                        Object.values(knockoutData).forEach(phaseMatches => {
                            const matchesInPhase = phaseMatches.filter(m => m.date === formattedDate);
                            if(matchesInPhase.length > 0) {
                                filtered = filtered.concat(matchesInPhase);
                                isKnockoutMatch = true;
                            }
                        });
                    }
                    
                    if (filtered.length > 0) {
                        renderMatches(filtered, isKnockoutMatch);
                    } else {
                        renderMatches([]); 
                    }
                }
            });

            // 6. Iniciar el intervalo de auto-refresco
            setInterval(refreshCurrentView, 10 * 60 * 1000); // 10 minutos
        }
    </script>
</body>
</html>
