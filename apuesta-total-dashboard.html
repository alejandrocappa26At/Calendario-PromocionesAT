<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APUESTA TOTAL - Dashboard Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #050505 0%, #0d0d0d 100%);
            color: #e0e0e0;
            line-height: 1.6;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff0066;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff3366;
        }

        /* ==================== HEADER ==================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: linear-gradient(90deg, rgba(5, 5, 5, 0.95) 0%, rgba(13, 13, 13, 0.95) 100%);
            border-bottom: 2px solid rgba(255, 0, 102, 0.3);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(255, 0, 102, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff0066 0%, #ff3366 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.5);
        }

        .header-text h1 {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #ffffff 0%, #ff0066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-text p {
            font-size: 12px;
            color: #888;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .header-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: inherit;
            transition: left 0.3s ease;
            z-index: -1;
        }

        .header-btn.yellow {
            border-color: #ffd700;
            color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .header-btn.yellow:hover {
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            transform: scale(1.05) translateY(-2px);
        }

        .header-btn.green {
            border-color: #00ff66;
            color: #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3);
        }

        .header-btn.green:hover {
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.8);
            transform: scale(1.05) translateY(-2px);
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ==================== NAVEGACIÓN MESES ==================== */
        .month-navigation {
            text-align: center;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }

        .month-nav-btn {
            background: rgba(255, 0, 102, 0.1);
            border: 2px solid rgba(255, 0, 102, 0.3);
            color: #ff0066;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .month-nav-btn:hover {
            background: rgba(255, 0, 102, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.5);
            transform: scale(1.1);
        }

        .month-display {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .month-display .month-name {
            color: #ffffff;
        }

        .month-display .month-year {
            color: #ff0066;
        }

        /* ==================== PROMOCIONES ==================== */
        .promotions-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .promotions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .promotion-card {
            background: rgba(15, 15, 15, 0.8);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .promotion-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .promotion-card.green {
            border-color: #00ff66;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
        }

        .promotion-card.green:hover {
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.6);
            transform: translateY(-8px);
        }

        .promotion-card.purple {
            border-color: #9d4edd;
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.2);
        }

        .promotion-card.purple:hover {
            box-shadow: 0 0 40px rgba(157, 78, 221, 0.6);
            transform: translateY(-8px);
        }

        .promotion-card.yellow {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }

        .promotion-card.yellow:hover {
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
            transform: translateY(-8px);
        }

        .promotion-card.blue {
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
        }

        .promotion-card.blue:hover {
            box-shadow: 0 0 40px rgba(0, 217, 255, 0.6);
            transform: translateY(-8px);
        }

        .promotion-card.red {
            border-color: #ff0066;
            box-shadow: 0 0 15px rgba(255, 0, 102, 0.2);
        }

        .promotion-card.red:hover {
            box-shadow: 0 0 40px rgba(255, 0, 102, 0.6);
            transform: translateY(-8px);
        }

        .promotion-header {
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }

        .promotion-icon {
            font-size: 28px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .promotion-name {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .promotion-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            align-self: flex-start;
            position: relative;
            z-index: 1;
        }

        .promotion-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* ==================== CALENDARIO ==================== */
        .calendar-wrapper {
            background: rgba(15, 15, 15, 0.8);
            border-radius: 20px;
            border: 2px solid rgba(255, 0, 102, 0.2);
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 0, 102, 0.1);
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .calendar-day-name {
            text-align: center;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            color: #888;
            text-transform: uppercase;
            padding: 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
        }

        .calendar-cell {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            min-height: 100px;
        }

        .calendar-cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 102, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .calendar-cell:hover::before {
            opacity: 1;
        }

        .calendar-cell:hover {
            border-color: rgba(255, 0, 102, 0.4);
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.05);
        }

        .calendar-cell.today {
            border-color: #ff0066;
            background: rgba(255, 0, 102, 0.15);
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.3), inset 0 0 20px rgba(255, 0, 102, 0.1);
        }

        .calendar-cell.today:hover {
            box-shadow: 0 0 30px rgba(255, 0, 102, 0.6), inset 0 0 20px rgba(255, 0, 102, 0.15);
        }

        .calendar-cell.empty {
            cursor: default;
            background: transparent;
            border: none;
        }

        .calendar-cell.empty:hover {
            transform: none;
            background: transparent;
            border: none;
        }

        .cell-number {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #666;
        }

        .calendar-cell.today .cell-number {
            color: #ff0066;
        }

        .cell-icons {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 4px;
            font-size: 14px;
        }

        /* ==================== MODAL ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            border: 2px solid #ff0066;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 60px rgba(255, 0, 102, 0.3);
            position: relative;
            overflow: hidden;
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0066, transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(255, 0, 102, 0.1);
            border: 1px solid rgba(255, 0, 102, 0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff0066;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 0, 102, 0.2);
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .modal-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
            color: #ccc;
            font-size: 14px;
        }

        .modal-info-item {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .modal-info-label {
            color: #ff0066;
            font-weight: 600;
            min-width: 80px;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff0066 0%, #ff3366 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 0, 102, 0.5);
        }

        /* ==================== RESPONSIVO ==================== */
        @media (max-width: 768px) {
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .header-right {
                width: 100%;
                justify-content: center;
            }

            .container {
                padding: 20px 15px;
            }

            .promotions-grid {
                grid-template-columns: 1fr;
            }

            .month-display {
                font-size: 24px;
            }

            .calendar-wrapper {
                padding: 20px;
            }

            .calendar-cell {
                min-height: 80px;
                font-size: 12px;
            }

            .header-btn {
                padding: 8px 16px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .header-left {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .logo-box {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .header-text h1 {
                font-size: 16px;
            }

            .header-text p {
                font-size: 11px;
            }

            .month-navigation {
                gap: 15px;
            }

            .month-display {
                font-size: 18px;
            }

            .calendar-cell {
                min-height: 70px;
            }

            .cell-icons {
                font-size: 12px;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== HEADER ==================== -->
    <header class="header">
        <div class="header-left">
            <div class="logo-box">⚡</div>
            <div class="header-text">
                <h1>APUESTA <span style="color: #ff0066;">TOTAL</span></h1>
                <p>CALENDARIO INTERACTIVO DE PROMOCIONES</p>
            </div>
        </div>
        <div class="header-right">
            <button class="header-btn yellow" onclick="window.open('mundial-2026.html', '_blank')">
                🏆 Fixture Mundial
            </button>
            <button class="header-btn green" onclick="handleFilterChange('grilla')">
                ⚡ Icono AT - Grilla
            </button>
        </div>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <div class="container">
        <!-- ==================== MONTH NAVIGATION ==================== -->
        <div class="month-navigation">
            <button class="month-nav-btn" onclick="previousMonth()">◀</button>
            <div class="month-display">
                <span class="month-name" id="monthName">Junio</span>
                <span class="month-year" id="yearName">2026</span>
            </div>
            <button class="month-nav-btn" onclick="nextMonth()">▶</button>
        </div>

        <!-- ==================== PROMOTIONS ==================== -->
        <div class="promotions-section">
            <h2 class="section-title">🎁 Promociones Destacadas</h2>
            <div class="promotions-grid" id="promotionsGrid">
                <!-- Se genera dinámicamente -->
            </div>
        </div>

        <!-- ==================== CALENDAR ==================== -->
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <div class="calendar-day-name">Lun</div>
                <div class="calendar-day-name">Mar</div>
                <div class="calendar-day-name">Mié</div>
                <div class="calendar-day-name">Jue</div>
                <div class="calendar-day-name">Vie</div>
                <div class="calendar-day-name">Sab</div>
                <div class="calendar-day-name">Dom</div>
            </div>
            <div class="calendar-days" id="calendarDays">
                <!-- Se genera dinámicamente -->
            </div>
        </div>
    </div>

    <!-- ==================== MODAL ==================== -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 class="modal-title" id="modalTitle">Promoción</h2>
            <div class="modal-info" id="modalInfo">
                <!-- Se genera dinámicamente -->
            </div>
            <button class="modal-btn" onclick="closeModal()">Ver Detalle Completo</button>
        </div>
    </div>

    <script>
        // ==================== DATOS ==================== 
        const promotions = {
            '2026-06-05': {
                name: 'Camisetas de Equipos',
                category: 'green',
                icon: '👕',
                description: 'Obtén descuentos en camisetas de tus equipos favoritos',
                startDate: '2026-06-05',
                endDate: '2026-06-15'
            },
            '2026-06-10': {
                name: 'Apuestas Virtuales',
                category: 'purple',
                icon: '🎲',
                description: 'Juega en nuestros últimos juegos virtuales',
                startDate: '2026-06-10',
                endDate: '2026-06-20'
            },
            '2026-06-12': {
                name: 'Bono Bienvenida',
                category: 'yellow',
                icon: '💰',
                description: '100% de bono en tu primer depósito',
                startDate: '2026-06-12',
                endDate: '2026-06-30'
            },
            '2026-06-15': {
                name: 'Mundial Qatar',
                category: 'blue',
                icon: '🏆',
                description: 'Apuestas especiales para el mundial',
                startDate: '2026-06-15',
                endDate: '2026-07-15'
            },
            '2026-06-20': {
                name: 'Promoción Especial',
                category: 'red',
                icon: '🎁',
                description: 'Ofertas únicas por tiempo limitado',
                startDate: '2026-06-20',
                endDate: '2026-06-25'
            },
            '2026-06-25': {
                name: 'Giros Gratis',
                category: 'green',
                icon: '🎡',
                description: '50 giros gratis en nuestros mejores juegos',
                startDate: '2026-06-25',
                endDate: '2026-07-05'
            }
        };

        let currentMonth = 5; // Junio (0-indexado)
        let currentYear = 2026;
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        // ==================== FUNCIONES PRINCIPALES ==================== 
        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();

            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            // Días vacíos al inicio
            for (let i = 0; i < (startingDayOfWeek === 0 ? 6 : startingDayOfWeek - 1); i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-cell empty';
                calendarDays.appendChild(emptyCell);
            }

            // Días del mes
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cellDate = new Date(currentYear, currentMonth, day);
                cellDate.setHours(0, 0, 0, 0);

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';

                if (cellDate.getTime() === today.getTime()) {
                    cell.classList.add('today');
                }

                const numberDiv = document.createElement('div');
                numberDiv.className = 'cell-number';
                numberDiv.textContent = day;
                cell.appendChild(numberDiv);

                const iconsDiv = document.createElement('div');
                iconsDiv.className = 'cell-icons';

                if (promotions[dateStr]) {
                    iconsDiv.textContent = promotions[dateStr].icon;
                    cell.onclick = () => showModal(promotions[dateStr]);
                }

                cell.appendChild(iconsDiv);
                calendarDays.appendChild(cell);
            }
        }

        function renderPromotions() {
            const grid = document.getElementById('promotionsGrid');
            grid.innerHTML = '';

            const now = new Date();
            now.setHours(0, 0, 0, 0);

            Object.entries(promotions).forEach(([dateStr, promo]) => {
                const endDate = new Date(promo.endDate);
                endDate.setHours(23, 59, 59, 999);

                if (endDate >= now) {
                    const card = document.createElement('div');
                    card.className = `promotion-card ${promo.category}`;
                    card.onclick = () => showModal(promo);

                    card.innerHTML = `
                        <div class="promotion-header">
                            <div class="promotion-icon">${promo.icon}</div>
                            <div class="promotion-name">${promo.name}</div>
                        </div>
                        <button class="promotion-btn">Explorar</button>
                    `;

                    grid.appendChild(card);
                }
            });
        }

        function showModal(promo) {
            const modal = document.getElementById('modal');
            document.getElementById('modalTitle').textContent = promo.name;

            const modalInfo = document.getElementById('modalInfo');
            modalInfo.innerHTML = `
                <div class="modal-info-item">
                    <span class="modal-info-label">Icono:</span>
                    <span>${promo.icon}</span>
                </div>
                <div class="modal-info-item">
                    <span class="modal-info-label">Descripción:</span>
                    <span>${promo.description}</span>
                </div>
                <div class="modal-info-item">
                    <span class="modal-info-label">Inicio:</span>
                    <span>${formatDate(promo.startDate)}</span>
                </div>
                <div class="modal-info-item">
                    <span class="modal-info-label">Fin:</span>
                    <span>${formatDate(promo.endDate)}</span>
                </div>
            `;

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function previousMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            updateDisplay();
        }

        function nextMonth() {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('monthName').textContent = monthNames[currentMonth];
            document.getElementById('yearName').textContent = currentYear;
            renderCalendar();
            renderPromotions();
        }

        function handleFilterChange(filter) {
            console.log('Filtro: ', filter);
            // Aquí se pueden agregar filtros por categoría
        }

        // ==================== INICIALIZACIÓN ==================== 
        window.addEventListener('load', () => {
            updateDisplay();
        });

        // Cerrar modal al hacer clic fuera
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
