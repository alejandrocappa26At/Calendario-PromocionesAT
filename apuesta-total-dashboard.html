<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APUESTA TOTAL - Dashboard Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0b0b;
            color: #ffffff;
            line-height: 1.6;
        }

        /* Scrollbar personalizado */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: #121212;
        }

        ::-webkit-scrollbar-thumb {
            background: #5a5a5a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b3b3b3;
        }

        /* ==================== HEADER ==================== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: #000000;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-box {
            width: 140px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .logo-box img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }

        .titulo {
            font-size: 42px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 1px;
            margin: 0;
        }

        .apuesta {
            color: #e6e6e6;
        }

        .total {
            color: #ff3b30;
            text-shadow: 0 0 8px rgba(255, 59, 48, 0.4);
        }

        .subtitulo {
            color: #9e9e9e;
            font-size: 16px;
            margin-top: 8px;
            letter-spacing: 1px;
            font-style: italic;
            animation: pulseTextGlow 2s infinite ease-in-out;
        }

        @keyframes pulseTextGlow {
            0%, 100% {
                text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
                color: #9e9e9e;
            }
            50% {
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 25px rgba(255, 255, 255, 0.5);
                color: #ffffff;
            }
        }

        .header-right {
            display: flex;
            gap: 16px;
        }

        .header-btn {
            padding: 12px 24px;
            border-radius: 500px;
            background: #111111;
            cursor: pointer;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .header-btn.yellow {
            border: 1px solid #ffd700;
            color: #ffd700;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2), inset 0 0 5px rgba(255, 215, 0, 0.1);
        }

        .header-btn.yellow:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6), inset 0 0 10px rgba(255, 215, 0, 0.3);
            background: #1a1a1a;
        }

        .header-btn.green {
            border: 1px solid #00FF9D;
            color: #00FF9D;
            box-shadow: 0 0 10px rgba(0, 255, 157, 0.2), inset 0 0 5px rgba(0, 255, 157, 0.1);
        }

        .header-btn.green:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.6), inset 0 0 10px rgba(0, 255, 157, 0.3);
            background: #1a1a1a;
        }

        /* ==================== ANIMACIÓN SEÑALÉTICA (DATO AT - GRILLA) ==================== */
        @keyframes parpadeoSenaleticaGrilla {
            0%, 100% {
                background: transparent;
                box-shadow: 0 0 10px rgba(0, 255, 157, 0.2);
                color: #00FF9D;
                border-color: #00FF9D;
            }
            50% {
                background: rgba(0, 255, 157, 0.3);
                box-shadow: 0 0 25px rgba(0, 255, 157, 0.9), inset 0 0 15px rgba(0, 255, 157, 0.5);
                color: #ffffff;
                border-color: #ffffff;
            }
        }

        #btn-dato-grilla {
            animation: parpadeoSenaleticaGrilla 1.5s infinite;
            border-width: 2px;
        }

        #btn-dato-grilla i.fa-arrow-right {
            font-size: 18px; /* Flecha grande y visible */
            margin-left: 6px;
        }

        /* ==================== ANIMACIÓN SEÑALÉTICA (VOLVER AL CALENDARIO) ==================== */
        #btn-volver-grilla {
            animation: parpadeoSenaleticaGrilla 1.5s infinite;
            border-width: 2px;
            font-weight: 900;
        }

        #btn-volver-grilla i.fa-arrow-left {
            font-size: 18px; /* Flecha grande y visible */
            margin-right: 4px;
        }

        /* ==================== ANIMACIÓN SEÑALÉTICA (FIXTURE MUNDIAL) ==================== */
        @keyframes parpadeoSenaleticaMundial {
            0%, 100% {
                background: transparent;
                box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
                color: #ffd700;
                border-color: #ffd700;
            }
            50% {
                background: rgba(255, 215, 0, 0.3);
                box-shadow: 0 0 25px rgba(255, 215, 0, 0.9), inset 0 0 15px rgba(255, 215, 0, 0.5);
                color: #ffffff;
                border-color: #ffffff;
            }
        }

        #btn-fixture-mundial {
            animation: parpadeoSenaleticaMundial 1.5s infinite;
            border-width: 2px;
        }

        #btn-fixture-mundial i.fa-arrow-right {
            font-size: 18px; /* Flecha grande y visible */
            margin-left: 6px;
        }

        /* ==================== CONTAINER ==================== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        /* ==================== NAVEGACIÓN MESES ==================== */
        .month-navigation {
            text-align: left;
            margin-bottom: 30px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 16px;
        }

        .month-nav-btn {
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .month-nav-btn:hover {
            color: #ff3b30;
            text-shadow: 0 0 8px rgba(255, 59, 48, 0.6);
        }

        .month-display {
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .month-display .month-name {
            color: #e6e6e6;
        }

        .month-display .month-year {
            color: #ff3b30;
        }

        /* ==================== PROMOCIONES ==================== */
        .promotions-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            font-style: italic;
            margin-bottom: 24px;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4), 0 0 24px rgba(255, 255, 255, 0.2);
        }

        .promotions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .promotion-card {
            background: #111111;
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #222222;
            position: relative;
        }

        .promotion-card:hover:not(.unavailable) {
            transform: translateY(-5px);
            filter: brightness(1.1);
        }

        .promotion-card.green {
            border-color: rgba(0, 255, 102, 0.3);
        }
        .promotion-card.green:hover:not(.unavailable) { 
            border-color: #00ff66;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.6), 0 0 40px rgba(0, 255, 102, 0.4); 
        }
        .promotion-card.green .outline-icon {
            -webkit-text-stroke-color: #00ff66;
        }

        .promotion-card.yellow {
            border-color: rgba(255, 153, 0, 0.3); /* Naranja neón */
        }
        .promotion-card.yellow:hover:not(.unavailable) { 
            border-color: #ff9900;
            box-shadow: 0 0 20px rgba(255, 153, 0, 0.6), 0 0 40px rgba(255, 153, 0, 0.4); 
        }
        .promotion-card.yellow .outline-icon {
            -webkit-text-stroke-color: #ff9900;
        }

        .promotion-card.purple {
            border-color: rgba(157, 78, 221, 0.3);
        }
        .promotion-card.purple:hover:not(.unavailable) { 
            border-color: #9d4edd;
            box-shadow: 0 0 20px rgba(157, 78, 221, 0.6), 0 0 40px rgba(157, 78, 221, 0.4); 
        }
        .promotion-card.purple .outline-icon {
            -webkit-text-stroke-color: #9d4edd;
        }

        .promotion-card.blue {
            border-color: rgba(0, 217, 255, 0.3);
        }
        .promotion-card.blue:hover:not(.unavailable) { 
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.6), 0 0 40px rgba(0, 217, 255, 0.4); 
        }
        .promotion-card.blue .outline-icon {
            -webkit-text-stroke-color: #00d9ff;
        }

        .promotion-card.red {
            border-color: rgba(255, 0, 102, 0.3);
        }
        .promotion-card.red:hover:not(.unavailable) { 
            border-color: #ff0066;
            box-shadow: 0 0 20px rgba(255, 0, 102, 0.6), 0 0 40px rgba(255, 0, 102, 0.4); 
        }
        .promotion-card.red .outline-icon {
            -webkit-text-stroke-color: #ff0066;
        }

        .promotion-card.unavailable {
            border-color: #333333;
            box-shadow: none;
            opacity: 0.5;
            cursor: pointer;
            filter: grayscale(100%);
        }

        .promotion-card.unavailable .promotion-name {
            color: #888888;
        }

        /* ==================== BADGES PROMOCIONES ==================== */
        .promo-badge {
            position: absolute;
            top: -10px;
            right: 15px;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
        }
        .promo-badge.expirado {
            background: #222;
            color: #888;
            border: 1px solid #444;
        }
        .promo-badge.canje {
            background: #ff9900;
            color: #000;
            box-shadow: 0 0 10px rgba(255, 153, 0, 0.4);
        }

        /* ==================== ICONOS OUTLINE (PREMIUM) ==================== */
        .outline-icon {
            color: transparent !important;
            -webkit-text-stroke: 1.5px #FFFFFF;
            font-size: 16px;
            text-shadow: none !important;
            background: transparent !important;
            box-shadow: none !important;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .promotion-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .promotion-card:hover:not(.unavailable) .promotion-icon {
            transform: scale(1.1);
        }

        .promotion-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }

        .promotion-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 700;
            font-weight: 500;
            font-style: italic;
            color: #ffffff;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .promotion-explore {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 700;
            font-weight: 500;
            font-style: italic;
            color: #888888;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.3s ease;
            margin-top: 4px;
        }

        .promotion-card:hover:not(.unavailable) .promotion-explore {
            color: #ffffff;
        }

        /* ==================== CALENDARIO ==================== */
        .calendar-wrapper {
            background: #181818;
            border-radius: 8px;
            padding: 32px;
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .calendar-day-name {
            text-align: center;
            font-weight: 500;
            font-size: 14px;
            color: #b3b3b3;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-cell {
            aspect-ratio: 1;
            background: transparent;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: background-color 0.2s ease;
            position: relative;
            min-height: 80px;
            padding-top: 8px;
        }

        .calendar-cell:hover {
            background: #2a2a2a;
        }

        .calendar-cell.today {
            background: rgba(255, 255, 255, 0.05);
        }

        .calendar-cell.empty {
            cursor: default;
            background: transparent;
        }

        .calendar-cell.empty:hover {
            background: transparent;
        }

        .cell-number {
            font-size: 14px;
            font-weight: 700;
            color: #b3b3b3;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .calendar-cell.today .cell-number {
            color: #000000;
            background: #1ED760;
        }

        .cell-icons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px;
            font-size: 20px;
            margin-top: 4px;
        }
        
        .cell-icons .green .outline-icon { -webkit-text-stroke-color: #00ff66; }
        .cell-icons .yellow .outline-icon { -webkit-text-stroke-color: #ff9900; }
        .cell-icons .purple .outline-icon { -webkit-text-stroke-color: #9d4edd; }
        .cell-icons .blue .outline-icon { -webkit-text-stroke-color: #00d9ff; }
        .cell-icons .red .outline-icon { -webkit-text-stroke-color: #ff0066; }

        /* ==================== DATO AT - GRILLA PREMIUM ==================== */
        .grilla-view {
            animation: fadeIn 0.4s ease;
        }

        .grilla-header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .grilla-filters {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .grilla-search, .grilla-date {
            background: rgba(11, 11, 15, 0.8);
            border: 1px solid #333;
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
        }

        .grilla-search:focus, .grilla-date:focus {
            border-color: #00D9FF;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .grilla-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
        }

        .grilla-card {
            background: rgba(11, 11, 15, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease forwards;
            opacity: 0;
        }

        .grilla-card:hover {
            transform: translateY(-5px);
            border-color: #00FF9D;
            box-shadow: 0 10px 30px rgba(0, 255, 157, 0.15), inset 0 0 20px rgba(0, 255, 157, 0.05);
            background: rgba(11, 11, 15, 0.8);
        }
        
        .grilla-card.glow-red:hover { border-color: #FF0066; box-shadow: 0 10px 30px rgba(255, 0, 102, 0.15), inset 0 0 20px rgba(255, 0, 102, 0.05); }
        .grilla-card.glow-yellow:hover { border-color: #FFD700; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.15), inset 0 0 20px rgba(255, 215, 0, 0.05); }
        .grilla-card.glow-blue:hover { border-color: #00D9FF; box-shadow: 0 10px 30px rgba(0, 217, 255, 0.15), inset 0 0 20px rgba(0, 217, 255, 0.05); }

        .grilla-badge-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .grilla-badge {
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .badge-hoy { background: #00FF9D; color: #000; box-shadow: 0 0 10px rgba(0, 255, 157, 0.4); animation: pulse-neon 2s infinite; }
        .badge-manana { background: #FFD700; color: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
        .badge-proximo { background: #222; color: #fff; border: 1px solid #444; }

        .grilla-header-title {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .grilla-datetime {
            display: flex;
            gap: 16px;
            color: #ddd;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
        }
        .grilla-datetime i { color: #A855F7; }

        .grilla-teams {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin: 4px 0;
            background: rgba(0,0,0,0.4);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .grilla-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .grilla-flag {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .grilla-team-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 14px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .grilla-vs {
            font-size: 14px;
            font-weight: 900;
            color: #666;
            font-style: italic;
        }

        .grilla-section-title {
            font-size: 11px;
            font-weight: 800;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .grilla-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .grilla-list li {
            font-size: 13px;
            color: #ccc;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.5;
        }
        
        .grilla-list li i {
            color: #00FF9D;
            font-size: 12px;
            margin-top: 4px;
        }

        .grilla-tv {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .grilla-tv span {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #eee;
        }

        .grilla-countdown {
            font-family: monospace;
            font-size: 13px;
            color: #FFD700;
            background: rgba(255, 215, 0, 0.1);
            padding: 4px 12px;
            border-radius: 50px;
            font-weight: bold;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* ==================== MODAL ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: rgba(11, 11, 15, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 24px;
            padding: 0;
            max-width: 550px;
            width: 90%;
            animation: slideUp 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.15), inset 0 0 20px rgba(0, 255, 136, 0.05);
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;

        // ==================== FUNCIONES PRINCIPALES ==================== 
        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startingDayOfWeek = firstDay.getDay();

            const calendarDays = document.getElementById('calendarDays');
            calendarDays.innerHTML = '';

            // Días vacíos al inicio
            for (let i = 0; i < (startingDayOfWeek === 0 ? 6 : startingDayOfWeek - 1); i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-cell empty';
                calendarDays.appendChild(emptyCell);
            }

            // Días del mes
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cellDate = new Date(currentYear, currentMonth, day);
                cellDate.setHours(0, 0, 0, 0);

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';

                if (cellDate.getTime() === today.getTime()) {
                    cell.classList.add('today');
                }

                const numberDiv = document.createElement('div');
                numberDiv.className = 'cell-number';
                numberDiv.textContent = day;
                cell.appendChild(numberDiv);

                const iconsDiv = document.createElement('div');
                iconsDiv.className = 'cell-icons';

                // Encontrar todas las promos activas en esta fecha específica
                const activePromos = Object.values(promotions).filter(promo => {
                    return dateStr >= promo.startDate && dateStr <= promo.endDate && promo.available !== false;
                });

                if (activePromos.length > 0) {
                    activePromos.forEach(promo => {
                        const iconSpan = document.createElement('span');
                        iconSpan.className = promo.category;
                        iconSpan.innerHTML = promo.icon;
                        iconSpan.style.cursor = 'pointer';
                        iconSpan.onclick = (e) => { e.stopPropagation(); showModal(promo); };
                        iconsDiv.appendChild(iconSpan);
                    });
                    cell.onclick = () => showModal(activePromos, dateStr);
                }

                cell.appendChild(iconsDiv);
                calendarDays.appendChild(cell);
            }
        }

        function renderPromotions() {
            const grid = document.getElementById('promotionsGrid');
            grid.innerHTML = '';

            // Obtenemos la fecha actual del sistema automáticamente
            const now = new Date();
            const systemDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

            Object.entries(promotions).forEach(([dateStr, promo]) => {
                const card = document.createElement('div');
                
                let state = 'activo';
                if (promo.canjeDate && systemDate > promo.canjeDate) {
                    state = 'expirado';
                } else if (promo.endDate && systemDate > promo.endDate) {
                    state = 'canje';
                } else if (promo.startDate && systemDate < promo.startDate) {
                    state = 'proximamente';
                }

                // Fallback si "available" es false
                if (promo.available === false) {
                    state = 'expirado';
                }
                
                card.className = `promotion-card ${promo.category}`;
                let badgeHtml = '';
                let exploreText = '• EXPLORAR';

                if (state === 'activo') {
                    card.onclick = () => showModal(promo);
                } else if (state === 'canje') {
                    card.classList.add('canje-disponible');
                    badgeHtml = '<div class="promo-badge canje">CANJE DISPONIBLE</div>';
                    exploreText = '• VER CONDICIONES';
                    card.onclick = () => showModal(promo);
                } else if (state === 'expirado') {
                    card.classList.add('unavailable');
                    badgeHtml = '<div class="promo-badge expirado">PROMOCIÓN EXPIRADA</div>';
                    exploreText = '• NO VIGENTE';
                    card.onclick = () => showModal(promo);
                } else if (state === 'proximamente') {
                    card.classList.add('unavailable');
                    badgeHtml = '<div class="promo-badge expirado" style="background: #333; color: #fff;">PRÓXIMAMENTE</div>';
                    exploreText = '• NO INICIADA';
                    card.onclick = () => showModal(promo);

                card.innerHTML = `

                    </div>

                grid.appendChild(card);
            });

        function formatDate(dateStr) {
            const [year, month, day] = dateStr.split('-');
            const date = new Date(year, month - 1, day);
            return date.toLocaleDateString('es-ES', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function previousMonth() {
            if (currentMonth === 0) {
                currentMonth = 11;
                currentYear--;
            } else {
                currentMonth--;
            }
            updateDisplay();
        }

        function nextMonth() {
            if (currentMonth === 11) {
                currentMonth = 0;
                currentYear++;
            } else {
                currentMonth++;
            }
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('monthName').textContent = monthNames[currentMonth].toUpperCase();
            document.getElementById('yearName').textContent = currentYear;
            renderCalendar();
            renderPromotions();

                        </div>

                        <div>
                            <div class="grilla-section-title"><i class="fa-solid fa-tv outline-icon"></i> Transmisión:</div>
                            <div class="grilla-tv">${ev.tv.map(c => `<span>${c}</span>`).join('')}</div>
                        </div>

                        <div>
                            <div class="grilla-section-title"><i class="fa-solid fa-book-open outline-icon"></i> DATO AT</div>
                            <ul class="grilla-list">${ev.datos.map(d => `<li><i class="fa-solid fa-caret-right"></i> ${d}</li>`).join('')}</ul>
                        </div>

                        <div>
                            <div class="grilla-section-title"><i class="fa-solid fa-bullseye outline-icon"></i> Mercados a incentivar</div>
                            <ul class="grilla-list">${ev.mercados.map(m => `<li><i class="fa-solid fa-bolt"></i> ${m}</li>`).join('')}</ul>
                        </div>
                    </div>
                `;
            });
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                document.querySelectorAll('.grilla-countdown').forEach(el => {
                    const target = new Date(el.dataset.target).getTime();
                    const distance = target - now;
                    if (distance < 0) {
                        el.innerHTML = "¡EN VIVO!";
                        el.style.color = "#FF0066";
                        el.style.borderColor = "rgba(255, 0, 102, 0.4)";
                    } else {
                        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                        const s = Math.floor((distance % (1000 * 60)) / 1000);
                        el.innerHTML = `⏳ ${d}d ${h}h ${m}m ${s}s`;
                    }
                });
            }, 1000);
        }

        // ==================== INICIALIZACIÓN ==================== 
        window.addEventListener('load', () => {
            updateDisplay();
        });

        // Cerrar modal al hacer clic fuera
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
